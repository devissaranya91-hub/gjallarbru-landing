<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gjallarbrú | Sovereign AI & Data Infrastructure</title>
    <style>
        :root {
            --bg-main: #06090e;
            --bg-gradient: radial-gradient(circle at 50% 0%, #0f172a 0%, #06090e 80%);
            --accent-blue: #38bdf8; 
            --accent-emerald: #34d399; 
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --card-bg: rgba(13, 17, 23, 0.75);
            --border-color: #21262d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            background-image: var(--bg-gradient);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.01) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.01) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding-top: 50px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(56, 189, 248, 0.06);
            border: 1px solid rgba(56, 189, 248, 0.25);
            color: var(--accent-blue);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 24px;
            font-family: monospace;
        }

        .badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent-blue);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-blue);
        }

        .logo {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: #ffffff;
            margin-bottom: 16px;
        }

        .logo span {
            color: var(--accent-blue);
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
        }

        .tagline {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 580px;
            margin: 0 auto;
            font-weight: 400;
        }

        .section-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 40px 0 24px 0;
        }

        .section-divider span {
            font-family: monospace;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-muted);
            font-weight: 700;
        }

        .section-divider::before, .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-color), transparent);
        }

        .stack-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 50px;
        }

        .prime-section {
            background: linear-gradient(145deg, rgba(22, 27, 34, 0.9) 0%, rgba(13, 17, 23, 0.8) 100%);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .prime-section.ai-tier { border-left: 4px solid var(--accent-blue); }
        .prime-section.security-tier { border-left: 4px solid var(--accent-emerald); }

        .tech-label {
            font-family: monospace;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
            display: block;
        }
        .ai-tier .tech-label { color: var(--accent-blue); }
        .security-tier .tech-label { color: var(--accent-emerald); }

        .prime-section h3 {
            font-size: 1.4rem;
            color: #ffffff;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .sub-feature-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed rgba(255, 255, 255, 0.06);
        }

        @media(min-width: 500px) {
            .sub-feature-grid { grid-template-columns: 1fr 1fr; }
        }

        .sub-card {
            background: rgba(255, 255, 255, 0.02);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .sub-card h4 {
            font-size: 1rem;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .sub-card p, .prime-section > p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* FIXED HARDWARE SPEC GRID WITH OVERFLOW PROTECTION */
        .spec-panel {
            background: rgba(6, 9, 14, 0.85);
            border: 1px solid rgba(56, 189, 248, 0.15);
            border-radius: 8px;
            padding: 14px;
            margin: 24px 0;
            font-family: monospace;
            overflow: hidden; /* Prevents child items from spilling past borders */
        }

        .spec-header {
            display: grid;
            grid-template-columns: 1fr auto;
            color: var(--accent-blue);
            border-bottom: 1px solid rgba(56, 189, 248, 0.15);
            padding-bottom: 8px;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.72rem;
        }

        .spec-row {
            display: grid;
            grid-template-columns: 95px 1fr; /* Optimized track size for labels vs long values */
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            font-size: 0.7rem;
            align-items: center;
        }

        .spec-row:last-child {
            border-bottom: none;
        }

        .spec-label {
            color: var(--text-muted);
            white-space: nowrap;
        }

        .spec-value {
            color: #ffffff;
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Safely clips text into '...' if screen limits are pushed */
        }

        /* Dynamically scale text up marginally on slightly larger phones/tablets */
        @media(min-width: 400px) {
            .spec-row {
                grid-template-columns: 110px 1fr;
                font-size: 0.72rem;
            }
        }

        .contact-section {
            background: linear-gradient(180deg, rgba(22, 27, 34, 0.4) 0%, rgba(13, 17, 23, 0.9) 100%);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 60px;
        }

        .contact-section h2 {
            font-size: 1.6rem;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            color: var(--text-main);
            font-family: monospace;
        }

        input, textarea {
            width: 100%;
            background-color: rgba(6, 9, 14, 0.7);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px;
            color: #ffffff;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.12);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-blue) 0%, #0284c7 100%);
            color: #06090e;
            border: none;
            border-radius: 8px;
            padding: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.2);
            transition: all 0.2s ease;
        }
